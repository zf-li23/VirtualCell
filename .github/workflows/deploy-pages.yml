name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

# GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-viewer/package-lock.json

      - name: Install dependencies
        working-directory: docs-viewer
        run: npm ci

      - name: Sync notes (fallback for non-symlink env)
        working-directory: docs-viewer
        run: node scripts/sync-notes.mjs

      - name: Build
        working-directory: docs-viewer
        run: npm run build
        env:
          BASE: /VirtualCell/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-viewer/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
